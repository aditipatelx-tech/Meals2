<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>minimal-meal-planner-v3</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root,[data-theme="light"]{
      --text-xs:clamp(.75rem,.72rem + .18vw,.85rem);
      --text-sm:clamp(.92rem,.86rem + .2vw,1rem);
      --text-base:clamp(1rem,.96rem + .2vw,1.08rem);
      --text-lg:clamp(1.2rem,1.06rem + .45vw,1.45rem);
      --text-xl:clamp(1.8rem,1.2rem + 1.6vw,2.5rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
      --bg:#f6f4ef;--surface:#ffffff;--surface-soft:#f1eee7;--border:#ddd8cd;--text:#1f1d18;--muted:#69645b;--primary:#0d6668;--primary-soft:#dcecec;--success:#437a22;--warning:#99531e;--inverse:#ffffff;--radius:18px;--radius-pill:999px;--shadow:0 10px 30px rgba(33,28,18,.06);--font-display:'Boska', Georgia, serif;--font-body:'Satoshi', Arial, sans-serif;--content:1080px;
    }
    [data-theme="dark"]{
      --bg:#151412;--surface:#1d1b18;--surface-soft:#26231f;--border:#3d3932;--text:#efe8da;--muted:#b7af9f;--primary:#78b6b8;--primary-soft:#233536;--success:#8abc69;--warning:#d99561;--inverse:#151412;--shadow:0 14px 34px rgba(0,0,0,.28);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:none;text-size-adjust:none}
    body{min-height:100vh;font-family:var(--font-body);font-size:var(--text-base);line-height:1.5;background:var(--bg);color:var(--text)}
    button,input,select{font:inherit;color:inherit}
    button{cursor:pointer;-webkit-tap-highlight-color:transparent}
    .container{max-width:var(--content);margin:auto;padding-inline:var(--space-4)}
    .header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid color-mix(in srgb,var(--text) 8%,transparent)}
    .header-inner{display:flex;justify-content:space-between;align-items:center;padding:var(--space-4) 0;gap:var(--space-3)}
    .brand{display:flex;align-items:center;gap:var(--space-3)}
    .logo{width:38px;height:38px;padding:8px;border-radius:12px;background:var(--primary);color:var(--inverse)}
    .brand strong{display:block;font-size:var(--text-sm)}
    .brand span{display:block;font-size:var(--text-xs);color:var(--muted)}
    .theme-toggle{min-width:44px;min-height:44px;border-radius:var(--radius-pill);border:1px solid color-mix(in srgb,var(--text) 10%,transparent);background:var(--surface)}
    .hero{padding:clamp(var(--space-8),8vw,var(--space-16)) 0 var(--space-8)}
    .hero-card,.panel,.meal-card{background:var(--surface);border:1px solid color-mix(in srgb,var(--text) 8%,transparent);box-shadow:var(--shadow);border-radius:var(--radius)}
    .hero-card{padding:var(--space-8)}
    .eyebrow{display:inline-flex;align-items:center;padding:.45rem .8rem;border-radius:var(--radius-pill);background:var(--primary-soft);color:var(--primary);font-size:var(--text-xs);letter-spacing:.04em;text-transform:uppercase}
    h1,h2,h3{font-family:var(--font-display);line-height:1.02}
    h1{font-size:var(--text-xl);max-width:10ch;margin-top:var(--space-4)}
    .hero-card p{margin-top:var(--space-4);max-width:42ch;color:var(--muted)}
    .quick-row{display:flex;flex-wrap:wrap;gap:var(--space-3);margin-top:var(--space-6)}
    .btn{min-height:44px;padding:.8rem 1rem;border-radius:var(--radius-pill);border:1px solid transparent;background:transparent;font-weight:700}
    .btn-primary{background:var(--primary);color:var(--inverse)}
    .btn-secondary{background:var(--surface);border-color:color-mix(in srgb,var(--text) 10%,transparent)}
    .layout{display:grid;grid-template-columns:280px 1fr;gap:var(--space-5);padding-bottom:var(--space-16)}
    .panel{padding:var(--space-5)}
    .panel h2{font-size:var(--text-lg);margin-bottom:var(--space-3)}
    .field{margin-bottom:var(--space-4)}
    .field label{display:block;font-size:var(--text-sm);font-weight:700;margin-bottom:var(--space-2)}
    .field select,.field input{width:100%;min-height:48px;padding:0 var(--space-4);border-radius:14px;border:1px solid color-mix(in srgb,var(--text) 12%,transparent);background:var(--surface-soft)}
    .chips{display:flex;flex-wrap:wrap;gap:var(--space-2)}
    .chip{min-height:42px;padding:.65rem .9rem;border-radius:var(--radius-pill);border:1px solid color-mix(in srgb,var(--text) 10%,transparent);background:var(--surface-soft)}
    .chip.active{background:var(--primary);color:var(--inverse);border-color:var(--primary)}
    .helper{color:var(--muted);font-size:var(--text-sm)}
    .planner-top{display:flex;justify-content:space-between;gap:var(--space-3);align-items:flex-end;margin-bottom:var(--space-4)}
    .meal-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-4)}
    .meal-card{padding:var(--space-5);display:grid;gap:var(--space-3)}
    .meal-card h3{font-size:var(--text-lg)}
    .meta{display:flex;flex-wrap:wrap;gap:var(--space-2)}
    .tag{display:inline-flex;align-items:center;padding:.38rem .72rem;border-radius:var(--radius-pill);font-size:var(--text-xs);background:var(--surface-soft)}
    .tag.primary{color:var(--primary)}
    .tag.veg{color:var(--success)}
    .tag.nonveg{color:var(--warning)}
    .desc{color:var(--muted);font-size:var(--text-sm)}
    .line{display:flex;flex-wrap:wrap;gap:var(--space-2);color:var(--muted);font-size:var(--text-sm)}
    .empty{padding:var(--space-8);text-align:center;border-radius:var(--radius);background:var(--surface-soft);color:var(--muted)}
    @media (max-width:900px){
      .layout{grid-template-columns:1fr}
      .meal-grid{grid-template-columns:1fr}
      .hero-card,.panel,.meal-card{box-shadow:none}
      .planner-top{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="brand" aria-label="Meal planner brand">
        <svg class="logo" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M18 14C26 14 32 20 32 28V50" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
          <path d="M46 14V50" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
          <path d="M22 20H42" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
          <path d="M22 32H42" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
        </svg>
        <div>
          <strong>MealCraft Planner</strong>
          <span>Quick meal picker</span>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-card">
          <span class="eyebrow">Smarter meal planning</span>
          <h1>Fast filters. Clean results. Less effort.</h1>
          <p>Pick a meal, cuisine, and diet. Shuffle any time.</p>
          <div class="quick-row">
            <button class="btn btn-primary" id="allBtn" type="button">All meals</button>
            <button class="btn btn-secondary" id="vegBtn" type="button">Veg</button>
            <button class="btn btn-secondary" id="nonVegBtn" type="button">Non-veg</button>
            <button class="btn btn-secondary" id="randomBtn" type="button">Random</button>
          </div>
        </div>
      </div>
    </section>

    <section class="container layout">
      <aside class="panel">
        <h2>Customize</h2>
        <div class="field">
          <label for="mealType">Meal</label>
          <select id="mealType">
            <option value="all">All</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
            <option value="Snack">Snack</option>
          </select>
        </div>
        <div class="field">
          <label for="cuisineSelect">Cuisine</label>
          <select id="cuisineSelect"></select>
        </div>
        <div class="field">
          <label>Diet</label>
          <div class="chips" id="dietChips"></div>
        </div>
        <div class="field">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="text" placeholder="Paneer, chicken, oats" />
        </div>
        <div class="quick-row" style="margin-top:0">
          <button class="btn btn-primary" id="shuffleBtn" type="button">Shuffle</button>
          <button class="btn btn-secondary" id="resetBtn" type="button">Reset</button>
        </div>
      </aside>

      <section class="panel">
        <div class="planner-top">
          <div>
            <h2>Meal cards</h2>
            <p class="helper" id="resultsCopy">Loading meals</p>
          </div>
          <p class="helper">Pick filters or tap Random.</p>
        </div>
        <div class="meal-grid" id="mealGrid"></div>
      </section>
    </section>
  </main>

  <script>
    const meals = [
      {name:'Masala Oats Bowl', type:'Breakfast', cuisine:'Indian', diet:'Veg', time:'15 min', calories:'320 kcal', description:'Savory oats, peas, carrots.', ingredients:['Oats','Peas','Carrots']},
      {name:'Paneer Tikka Wrap', type:'Lunch', cuisine:'Indian', diet:'Veg', time:'25 min', calories:'480 kcal', description:'Paneer wrap with onion and mint.', ingredients:['Paneer','Wrap','Onion']},
      {name:'Butter Chicken Rice Bowl', type:'Dinner', cuisine:'Indian', diet:'Non-Veg', time:'35 min', calories:'610 kcal', description:'Chicken curry with rice.', ingredients:['Chicken','Rice','Tomato']},
      {name:'Avocado Egg Toast', type:'Breakfast', cuisine:'American', diet:'Non-Veg', time:'10 min', calories:'350 kcal', description:'Avocado toast with eggs.', ingredients:['Bread','Avocado','Eggs']},
      {name:'Greek Chickpea Salad', type:'Lunch', cuisine:'Mediterranean', diet:'Veg', time:'12 min', calories:'390 kcal', description:'Chickpeas, olives, cucumber.', ingredients:['Chickpeas','Olives','Cucumber']},
      {name:'Herbed Chicken Pita', type:'Lunch', cuisine:'Mediterranean', diet:'Non-Veg', time:'20 min', calories:'470 kcal', description:'Chicken pita with garlic sauce.', ingredients:['Chicken','Pita','Greens']},
      {name:'Veggie Burrito Bowl', type:'Dinner', cuisine:'Mexican', diet:'Veg', time:'20 min', calories:'510 kcal', description:'Beans, rice, peppers.', ingredients:['Rice','Beans','Peppers']},
      {name:'Chipotle Chicken Tacos', type:'Dinner', cuisine:'Mexican', diet:'Non-Veg', time:'22 min', calories:'530 kcal', description:'Chicken tacos with slaw.', ingredients:['Chicken','Tortillas','Slaw']},
      {name:'Pesto Pasta Primavera', type:'Lunch', cuisine:'Italian', diet:'Veg', time:'18 min', calories:'500 kcal', description:'Pasta, pesto, zucchini.', ingredients:['Pasta','Pesto','Zucchini']},
      {name:'Lemon Garlic Salmon', type:'Dinner', cuisine:'Mediterranean', diet:'Non-Veg', time:'25 min', calories:'560 kcal', description:'Salmon with couscous.', ingredients:['Salmon','Couscous','Lemon']},
      {name:'Thai Basil Tofu', type:'Dinner', cuisine:'Thai', diet:'Veg', time:'18 min', calories:'430 kcal', description:'Tofu, basil, rice.', ingredients:['Tofu','Basil','Rice']},
      {name:'Chicken Hakka Noodles', type:'Lunch', cuisine:'East Asian', diet:'Non-Veg', time:'20 min', calories:'540 kcal', description:'Chicken noodles.', ingredients:['Noodles','Chicken','Cabbage']},
      {name:'Falafel Mezze Plate', type:'Lunch', cuisine:'Middle Eastern', diet:'Veg', time:'20 min', calories:'450 kcal', description:'Falafel, hummus, pita.', ingredients:['Falafel','Hummus','Pita']},
      {name:'Shakshuka Skillet', type:'Breakfast', cuisine:'Middle Eastern', diet:'Non-Veg', time:'18 min', calories:'360 kcal', description:'Eggs in tomato sauce.', ingredients:['Eggs','Tomato','Bread']},
      {name:'Berry Yogurt Parfait', type:'Snack', cuisine:'American', diet:'Veg', time:'5 min', calories:'220 kcal', description:'Yogurt, berries, granola.', ingredients:['Yogurt','Berries','Granola']},
      {name:'Satay Chicken Skewers', type:'Snack', cuisine:'Thai', diet:'Non-Veg', time:'16 min', calories:'280 kcal', description:'Chicken skewers with peanut dip.', ingredients:['Chicken','Peanut sauce','Lime']},
      {name:'Caprese Toasts', type:'Snack', cuisine:'Italian', diet:'Veg', time:'8 min', calories:'250 kcal', description:'Tomato, mozzarella, basil.', ingredients:['Bread','Tomato','Mozzarella']},
      {name:'Teriyaki Chicken Rice', type:'Dinner', cuisine:'East Asian', diet:'Non-Veg', time:'24 min', calories:'580 kcal', description:'Chicken rice bowl.', ingredients:['Chicken','Rice','Broccoli']}
    ];

    const state = { type:'all', cuisine:'All cuisines', diet:'All', search:'' };
    const diets = ['All','Veg','Non-Veg'];
    const cuisines = ['All cuisines', ...new Set(meals.map(m => m.cuisine))];

    const mealType = document.getElementById('mealType');
    const cuisineSelect = document.getElementById('cuisineSelect');
    const dietChips = document.getElementById('dietChips');
    const searchInput = document.getElementById('searchInput');
    const mealGrid = document.getElementById('mealGrid');
    const resultsCopy = document.getElementById('resultsCopy');

    cuisines.forEach(cuisine => {
      const option = document.createElement('option');
      option.value = cuisine;
      option.textContent = cuisine;
      cuisineSelect.appendChild(option);
    });

    function renderDietChips(){
      dietChips.innerHTML = '';
      diets.forEach(diet => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `chip${state.diet === diet ? ' active' : ''}`;
        btn.textContent = diet;
        btn.addEventListener('click', function(){
          state.diet = diet;
          renderDietChips();
          renderMeals();
        });
        dietChips.appendChild(btn);
      });
    }

    function getFilteredMeals(){
      return meals.filter(meal => {
        const typeOk = state.type === 'all' || meal.type === state.type;
        const cuisineOk = state.cuisine === 'All cuisines' || meal.cuisine === state.cuisine;
        const dietOk = state.diet === 'All' || meal.diet === state.diet;
        const text = `${meal.name} ${meal.description} ${meal.ingredients.join(' ')}`.toLowerCase();
        const searchOk = !state.search || text.includes(state.search.toLowerCase());
        return typeOk && cuisineOk && dietOk && searchOk;
      });
    }

    function renderMeals(list){
      const items = list || getFilteredMeals();
      resultsCopy.textContent = items.length ? `${items.length} meals` : 'No meals';
      if(!items.length){
        mealGrid.innerHTML = '<div class="empty">No matches. Try Reset.</div>';
        return;
      }
      mealGrid.innerHTML = items.map(meal => `
        <article class="meal-card">
          <h3>${meal.name}</h3>
          <div class="meta">
            <span class="tag primary">${meal.cuisine}</span>
            <span class="tag ${meal.diet === 'Veg' ? 'veg' : 'nonveg'}">${meal.diet}</span>
            <span class="tag">${meal.type}</span>
          </div>
          <p class="desc">${meal.description}</p>
          <div class="line">
            <span>${meal.time}</span>
            <span>•</span>
            <span>${meal.calories}</span>
          </div>
        </article>
      `).join('');
    }

    function resetAll(){
      state.type = 'all';
      state.cuisine = 'All cuisines';
      state.diet = 'All';
      state.search = '';
      mealType.value = 'all';
      cuisineSelect.value = 'All cuisines';
      searchInput.value = '';
      renderDietChips();
      renderMeals();
    }

    function shuffleCurrent(){
      const items = [...getFilteredMeals()];
      for(let i = items.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      renderMeals(items);
      resultsCopy.textContent = items.length ? `${items.length} shuffled` : 'No meals';
    }

    mealType.addEventListener('change', function(e){ state.type = e.target.value; renderMeals(); });
    cuisineSelect.addEventListener('change', function(e){ state.cuisine = e.target.value; renderMeals(); });
    searchInput.addEventListener('input', function(e){ state.search = e.target.value.trim(); renderMeals(); });
    document.getElementById('shuffleBtn').addEventListener('click', shuffleCurrent);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('allBtn').addEventListener('click', resetAll);
    document.getElementById('vegBtn').addEventListener('click', function(){ state.diet = 'Veg'; renderDietChips(); renderMeals(); });
    document.getElementById('nonVegBtn').addEventListener('click', function(){ state.diet = 'Non-Veg'; renderDietChips(); renderMeals(); });
    document.getElementById('randomBtn').addEventListener('click', function(){
      resetAll();
      const cuisinePool = cuisines.filter(c => c !== 'All cuisines');
      state.cuisine = cuisinePool[Math.floor(Math.random() * cuisinePool.length)];
      state.diet = Math.random() > 0.5 ? 'Veg' : 'Non-Veg';
      cuisineSelect.value = state.cuisine;
      renderDietChips();
      shuffleCurrent();
    });

    (function(){
      const toggle = document.querySelector('[data-theme-toggle]');
      const root = document.documentElement;
      let mode = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      root.setAttribute('data-theme', mode);
      toggle.addEventListener('click', function(){
        mode = mode === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', mode);
      });
    })();

    renderDietChips();
    resetAll();
  </script>
</body>
</html>
