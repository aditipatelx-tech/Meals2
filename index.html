<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d63384" />
  <title>Meal Roulette</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="hero card">
      <div>
        <p class="eyebrow">Meal Roulette</p>
        <h1>Find dinner fast, make it feel premium.</h1>
        <p class="sub">Search recipes, filter by cuisine or diet, and roll for a random meal in a polished modular interface.</p>
      </div>
      <div class="hero-actions">
        <button class="btn" id="rollBtn" type="button">Roll the Dice</button>
        <button class="btn btn-secondary" id="themeBtn" type="button">Dark mode</button>
      </div>
    </header>

    <section class="layout">
      <aside class="card panel controls">
        <input class="search" id="searchInput" type="search" placeholder="Search recipe, ingredient, cuisine..." />
        <div class="section-label">Cuisine</div>
        <div class="pill-row" id="cuisineFilters"></div>
        <div class="section-label">Diet</div>
        <div class="pill-row" id="dietFilters"></div>
        <div class="status" id="statusBox">Showing all recipes.</div>
      </aside>

      <main class="card panel">
        <div class="topline">
          <div>
            <h2 class="section-title">Recipes</h2>
            <p class="helper" id="countText"></p>
          </div>
          <button class="btn btn-ghost" id="resetBtn" type="button">Reset</button>
        </div>
        <div id="mealGrid" class="meal-list"></div>
      </main>
    </section>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="sheet">
      <div class="modal-top">
        <div>
          <h2 id="modalTitle"></h2>
          <div class="meta" id="modalMeta"></div>
        </div>
        <button class="close" id="closeModal" type="button" aria-label="Close">✕</button>
      </div>
      <p id="modalDescription" class="desc"></p>
      <div class="meta" id="modalQuick"></div>
      <div class="detail-grid">
        <section class="block">
          <h3>Ingredients</h3>
          <ul class="list" id="modalIngredients"></ul>
        </section>
        <section class="block">
          <h3>Instructions</h3>
          <ol class="list" id="modalSteps"></ol>
        </section>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
